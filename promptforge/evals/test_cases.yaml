  notes: "Count words in the Executive Summary section only"
  expected_behaviors:
    - "The Executive Summary section contains 150 words or fewer"
    - "The Executive Summary states the winning combination, its score, and a deployment recommendation"
  unexpected_behaviors:
    - "Executive Summary is empty"
    - "Executive Summary exceeds 200 words"

# =============================================================================
# END-TO-END TESTS
# =============================================================================

- id: e2e-001
  name: "Full pipeline from content moderation prompt to report.md produces all artifacts"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: end_to_end
  requires_execution: false
  notes: "Check that all expected artifacts exist after a completed run"
  expected_behaviors:
    - "experiments/{id}/state.yaml exists with current_stage: DONE"
    - "experiments/{id}/research_brief.md exists and is non-empty"
    - "experiments/{id}/plan.yaml exists and parses as valid YAML"
    - "experiments/{id}/templates/ directory exists with at least 2 .yaml files"
    - "experiments/{id}/data/test_inputs.yaml exists"
    - "experiments/{id}/matrix.yaml exists"
    - "experiments/{id}/results/ directory exists with at least one .jsonl file"
    - "experiments/{id}/execution_summary.yaml exists"
    - "experiments/{id}/evaluations/scores.jsonl exists"
    - "experiments/{id}/evaluations/summary.yaml exists"
    - "experiments/{id}/report.md exists and is non-empty"
    - "experiments/{id}/report_data.json exists and is valid JSON"
  unexpected_behaviors:
    - "Any of the listed artifacts is missing after the pipeline reports completion"
    - "state.yaml shows a stage other than DONE"
    - "report.md exists but evaluations/summary.yaml is missing"

- id: e2e-002
  name: "Budget constraint respected end-to-end"
  prompt: "Test few-shot vs zero-shot for classification, budget $5"
  category: end_to_end
  requires_execution: true
