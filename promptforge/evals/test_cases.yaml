# Prompt-Engineer Skill — Test Cases
#
# Schema per test case:
#   id:                    unique snake_case identifier
#   name:                  human-readable description
#   prompt:                the user message that triggers (or should not trigger) the skill
#   expected_behaviors:    list of things that MUST happen / be true
#   unexpected_behaviors:  list of things that must NOT happen / be true
#   category:              trigger | research | plan | build | execute | evaluate | report | end_to_end
#   requires_execution:    true = skipped unless --execute flag is passed (default: false)
#   notes:                 optional implementation notes for the checker

# =============================================================================
# TRIGGER TESTS — Should activate the skill
# =============================================================================

- id: trigger-001
  name: "Content moderation optimization request"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill activates and enters RESEARCH phase"
    - "Skill does NOT ask clarifying questions before starting research"
    - "Skill creates an experiment directory with state.yaml"
  unexpected_behaviors:
    - "Skill writes a single prompt and hands it to the user without running an experiment"
    - "Skill declines the request"
    - "Skill asks more than one clarifying question before starting"

- id: trigger-002
  name: "Multi-model comparison with specified models"
  prompt: "Find the best prompt for extracting data from invoices. Use Claude and GPT-4o"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill activates and enters RESEARCH phase"
    - "Skill locks in Claude and GPT-4o and does not research additional models"
    - "research_brief.md lists only the user-specified models in the recommended models section"
  unexpected_behaviors:
    - "Skill ignores the model specification and researches all available models"
    - "Skill treats this as a single-prompt writing task"

- id: trigger-003
  name: "A/B test prompt strategies"
  prompt: "I want to A/B test different prompt strategies for my chatbot"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill activates and enters RESEARCH phase"
    - "Skill interprets A/B testing as a prompt matrix experiment"
    - "plan.yaml is created with at least 2 template variants"
  unexpected_behaviors:
    - "Skill asks what A/B testing means instead of starting"
    - "Skill produces a single recommended prompt without running variants"

- id: trigger-004
  name: "Run a prompt experiment"
  prompt: "Run a prompt experiment to improve my summarization pipeline"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill activates and enters RESEARCH phase"
    - "Skill identifies the task type as generation (summarization)"
    - "research_brief.md includes summarization-specific techniques"
  unexpected_behaviors:
    - "Skill writes a summarization prompt without running an experiment"
    - "Skill asks the user to specify what an experiment means"

- id: trigger-005
  name: "Compare few-shot vs chain-of-thought"
  prompt: "Compare few-shot vs chain-of-thought for sentiment analysis"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill activates and enters RESEARCH phase"
    - "plan.yaml includes at minimum a few_shot template and a chain_of_thought template"
    - "Skill does not limit templates to only these two if research suggests more"
  unexpected_behaviors:
    - "Skill explains the difference theoretically without running a comparison"
    - "Skill produces a single template combining both techniques"

- id: trigger-006
  name: "Multi-model benchmark for code review"
  prompt: "Test 5 models to find the best one for code review prompts"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill activates and enters RESEARCH phase"
    - "Skill researches 5 or more models via web search"
    - "plan.yaml models axis includes at least 4 entries (user may not have full pricing for all 5)"
  unexpected_behaviors:
    - "Skill selects one model and writes a code review prompt without comparing"
    - "Skill uses fewer than 3 models without explaining why"

# =============================================================================
# TRIGGER TESTS — Should NOT activate the skill
# =============================================================================

- id: trigger-007
  name: "Single prompt request should not trigger"
  prompt: "Write me a prompt for my chatbot"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill does NOT activate"
    - "User receives a single written prompt or is redirected to another skill"
  unexpected_behaviors:
    - "Skill launches a full experiment pipeline for a simple prompt-writing request"
    - "Skill creates an experiment directory"

- id: trigger-008
  name: "Code debugging should not trigger"
  prompt: "Help me debug this Python script"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill does NOT activate"
    - "Request is handled as a general coding task"
  unexpected_behaviors:
    - "Skill treats code debugging as a prompt engineering task"
    - "Skill creates an experiment directory"

- id: trigger-009
  name: "Direct task should not trigger"
  prompt: "Summarize this document"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill does NOT activate"
    - "User's document is summarized directly"
  unexpected_behaviors:
    - "Skill starts a prompt experiment to find the best summarization prompt"
    - "Skill asks the user if they want to optimize their summarization pipeline"

- id: trigger-010
  name: "Informational question should not trigger"
  prompt: "What is prompt engineering?"
  category: trigger
  requires_execution: false
  expected_behaviors:
    - "Skill does NOT activate"
    - "Question is answered informatively without starting an experiment"
  unexpected_behaviors:
    - "Skill interprets the question as a request to run an experiment"
    - "Skill creates an experiment directory"

# =============================================================================
# RESEARCH PHASE TESTS
# =============================================================================

- id: research-001
  name: "research_brief.md contains all required sections"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: research
  requires_execution: false
  notes: "Check file existence and section headers in research_brief.md"
  expected_behaviors:
    - "research_brief.md exists at experiments/{id}/research_brief.md"
    - "research_brief.md contains a '## Task Definition' section that is non-empty"
    - "research_brief.md contains a '## Discovered LLM Models' section with a table"
    - "research_brief.md contains a '## Discovered Prompt Techniques' section with at least 4 techniques"
    - "research_brief.md contains a '## Recommended Parameter Strategy' section"
    - "research_brief.md contains a '## Success Criteria' section with checkboxes"
    - "research_brief.md contains a '## Constraints' section"
    - "research_brief.md contains a '## Test Data Strategy' section"
    - "research_brief.md is at least 800 characters (no empty or stub document)"
  unexpected_behaviors:
    - "Any required section header is missing"
    - "research_brief.md contains only placeholder text with no real content"
    - "The discovered LLM models table has zero rows"

- id: research-002
  name: "User-specified models are respected in research_brief.md"
  prompt: "Find the best prompt for extracting data from invoices. Use Claude Sonnet and GPT-4o only"
  category: research
  requires_execution: false
  notes: "When user specifies models, research_brief.md must list ONLY those models in recommended section"
  expected_behaviors:
    - "research_brief.md exists"
    - "The 'Recommended Models for This Task' section lists claude-sonnet and gpt-4o"
    - "plan.yaml models axis contains exactly the user-specified models and no others"
    - "research_brief.md notes that model research was skipped because user locked in specific models"
  unexpected_behaviors:
    - "plan.yaml includes models not specified by the user (e.g., Gemini, Haiku, GPT-4o-mini)"
    - "Skill ignores the user's model specification and researches additional models freely"

- id: research-003
  name: "research_brief.md has no empty sections"
  prompt: "Compare few-shot vs chain-of-thought for sentiment analysis"
  category: research
  requires_execution: false
  notes: "Each section must contain substantive content, not just a header"
  expected_behaviors:
    - "Every section in research_brief.md has at least one non-empty line of content below its header"
    - "The domain-specific section covers sentiment analysis edge cases (e.g., sarcasm, negation)"
    - "The parameter strategy section includes at least temperature values and rationale"
  unexpected_behaviors:
    - "Any section header is followed immediately by another header with no content in between"
    - "Any section contains only 'TBD' or placeholder text"

- id: research-004
  name: "research_brief.md domain context covers discovered edge cases"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: research
  requires_execution: false
  expected_behaviors:
    - "research_brief.md mentions at least 3 domain-specific edge cases for content moderation"
    - "Edge cases include nuanced scenarios (sarcasm, mixed-language, competitor mentions)"
    - "The 'Inputs' section includes format specification and realistic input examples"
    - "The 'Outputs' section includes a schema definition for the expected JSON output"
  unexpected_behaviors:
    - "Edge cases are generic and not specific to e-commerce content moderation"
    - "The output schema is absent or unspecified"

# =============================================================================
# PLAN PHASE TESTS
# =============================================================================

- id: plan-001
  name: "Criterion weights sum to 1.0"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: plan
  requires_execution: false
  notes: "Load plan.yaml and sum evaluation.criteria[*].weight — must equal 1.0 within float tolerance"
  expected_behaviors:
    - "plan.yaml exists at experiments/{id}/plan.yaml"
    - "plan.yaml parses as valid YAML without errors"
    - "Sum of all evaluation.criteria[*].weight values equals 1.0 (tolerance: ±0.001)"
    - "Each individual weight is between 0.0 and 1.0 exclusive"
  unexpected_behaviors:
    - "Weights sum to more than 1.001 or less than 0.999"
    - "Any weight is 0.0 (useless criterion) or greater than 0.6 (single criterion dominates)"
    - "evaluation.criteria is empty"

- id: plan-002
  name: "Estimated cost is within budget"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: plan
  requires_execution: false
  notes: "Check that the comment or computed cost in plan.yaml does not exceed budget.max_cost_usd"
  expected_behaviors:
    - "plan.yaml contains a budget.max_cost_usd field"
    - "The matrix size comment or estimated cost is less than or equal to budget.max_cost_usd"
    - "If estimated cost exceeds budget, the plan documents what was reduced (repetitions, models, strategy)"
  unexpected_behaviors:
    - "budget.max_cost_usd is absent from plan.yaml"
    - "The plan silently exceeds budget with no adjustment or documentation"

- id: plan-003
  name: "plan.yaml has minimum required axes"
  prompt: "Compare few-shot vs chain-of-thought for sentiment analysis"
  category: plan
  requires_execution: false
  notes: "Minimum viable experiment: 2 templates, 2 param sets, 1 model"
  expected_behaviors:
    - "axes.templates has at least 2 entries"
    - "axes.parameters has at least 2 entries"
    - "axes.models has at least 1 entry"
    - "Each template entry has id and file fields"
    - "Each parameter entry has id and temperature fields"
    - "Each model entry has id, name, and provider fields"
  unexpected_behaviors:
    - "axes.templates has only 1 entry (no comparison possible)"
    - "axes.parameters is absent"
    - "axes.models is absent or empty"

- id: plan-004
  name: "plan.yaml pauses for user confirmation"
  prompt: "Test 5 models to find the best one for code review prompts"
  category: plan
  requires_execution: false
  notes: "The pipeline must stop at PLAN phase and wait for user approval before BUILD"
  expected_behaviors:
    - "After producing plan.yaml, the pipeline presents a summary to the user"
    - "The summary includes: number of cells, estimated cost, and execution strategy"
    - "The pipeline does not proceed to BUILD without user confirmation"
    - "state.yaml current_stage remains 'PLAN' until user confirms"
  unexpected_behaviors:
    - "Pipeline proceeds directly from PLAN to BUILD without any user interaction"
    - "User is not shown the cost estimate before execution begins"

- id: plan-005
  name: "Template IDs in plan.yaml are unique"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: plan
  requires_execution: false
  expected_behaviors:
    - "All template id values in axes.templates are distinct strings"
    - "All model id values in axes.models are distinct strings"
    - "All parameter id values in axes.parameters are distinct strings"
  unexpected_behaviors:
    - "Two templates share the same id"
    - "Two models share the same id"

# =============================================================================
# BUILD PHASE TESTS
# =============================================================================

- id: build-001
  name: "Each template uses exactly one technique"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: build
  requires_execution: false
  notes: "Load each template YAML and check the technique field; also verify system_prompt uses one approach"
  expected_behaviors:
    - "Each template file contains a technique field"
    - "Each template's technique value is a single string (not a list or composite)"
    - "The template's prompt text corresponds to the declared technique (e.g., few_shot has examples)"
    - "No template declares technique: 'few_shot_cot' as a single identifier — hybrid techniques must be explicit"
  unexpected_behaviors:
    - "A template has no technique field"
    - "A template's technique field contains multiple values or is null"

- id: build-002
  name: "Each template includes output format instructions"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: build
  requires_execution: false
  notes: "The output format in research_brief.md must be reflected as explicit instructions in each template"
  expected_behaviors:
    - "Each template's system_prompt or user_prompt contains explicit output format instructions"
    - "For JSON-output tasks, the JSON schema appears in every template's prompts"
    - "Templates do not omit format instructions even for techniques that are verbose (e.g., CoT)"
  unexpected_behaviors:
    - "A template has no mention of the output format or schema"
    - "Different templates use conflicting output format specifications"

- id: build-003
  name: "Generated test_inputs.yaml has 15 or more inputs when no user data provided"
  prompt: "Run a prompt experiment to improve my summarization pipeline"
  category: build
  requires_execution: false
  notes: "Count inputs in test_inputs.yaml when plan.yaml data.source is 'generate'"
  expected_behaviors:
    - "data/test_inputs.yaml exists at experiments/{id}/data/test_inputs.yaml"
    - "The inputs list has at least 15 entries"
    - "Each input has a unique id field"
    - "Each input has a non-empty text field"
  unexpected_behaviors:
    - "test_inputs.yaml has fewer than 15 inputs"
    - "Any input is missing the id or text field"
    - "Two inputs share the same id"

- id: build-004
  name: "Test inputs cover easy, hard, and edge categories"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: build
  requires_execution: false
  notes: "Check metadata.category distribution across the inputs list"
  expected_behaviors:
    - "At least one input has metadata.category: 'easy'"
    - "At least one input has metadata.category: 'hard'"
    - "At least one input has metadata.category: 'edge'"
    - "The distribution is approximately 40% easy, 30% hard, 30% edge (within 15% tolerance)"
  unexpected_behaviors:
    - "All inputs have the same category"
    - "The category field is absent from all inputs"
    - "Edge cases are not present at all"

- id: build-005
  name: "Template variable declarations match prompt placeholders"
  prompt: "Compare few-shot vs chain-of-thought for sentiment analysis"
  category: build
  requires_execution: false
  notes: "Every {{ var }} in system_prompt and user_prompt must appear in variables list"
  expected_behaviors:
    - "Every Jinja2 placeholder in the template prompts has a corresponding entry in the variables list"
    - "There are no undeclared variables in the prompts"
    - "There are no declared variables that are not used in the prompts"
  unexpected_behaviors:
    - "A placeholder like {{ input }} appears in the prompt but is absent from the variables list"
    - "A variable is declared but never referenced in any prompt field"

# =============================================================================
# EXECUTE PHASE TESTS
# =============================================================================

- id: execute-001
  name: "validate.py passes before execution starts"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: execute
  requires_execution: true
  notes: "run_experiment.py must call validate.py and abort if validation fails"
  expected_behaviors:
    - "run_experiment.py runs validate.py before making any API calls"
    - "If validate.py returns failures, run_experiment.py exits with a non-zero code"
    - "No API calls are made when validation fails"
    - "The error message from validate.py is surfaced to the user"
  unexpected_behaviors:
    - "run_experiment.py skips validation and calls APIs directly"
    - "Validation failures are silently ignored"

- id: execute-002
  name: "Budget guard stops execution when ceiling is reached"
  prompt: "Test 5 models to find the best one for code review prompts"
  category: execute
  requires_execution: true
  notes: "Set a very low budget in plan.yaml and confirm BudgetExceededError is raised"
  expected_behaviors:
    - "run_experiment.py tracks running total cost in-memory"
    - "When running total >= budget.max_cost_usd, execution stops immediately"
    - "No additional API calls are made after the budget ceiling is hit"
    - "execution_summary.yaml records the final cost and the reason for stopping"
    - "A BudgetExceededError (or equivalent) is logged and surfaced"
  unexpected_behaviors:
    - "Execution continues past the budget ceiling"
    - "execution_summary.yaml is not written when execution is stopped early"

- id: execute-003
  name: "Each result record contains required cost and latency fields"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: execute
  requires_execution: true
  notes: "Sample 10 random records from results/*.jsonl and check for required fields"
  expected_behaviors:
    - "Every record in results/*.jsonl contains a tokens_in field (integer >= 0)"
    - "Every record contains a tokens_out field (integer >= 0)"
    - "Every record contains a cost_usd field (float >= 0.0)"
    - "Every record contains a latency_ms field (integer >= 0)"
    - "Every record contains cell_id, template_id, model_id, param_id, input_id fields"
  unexpected_behaviors:
    - "Any result record is missing tokens_in, tokens_out, cost_usd, or latency_ms"
    - "cost_usd is always 0.0 (indicates cost tracking is not implemented)"
    - "latency_ms is always 0 (indicates timing is not tracked)"

- id: execute-004
  name: "execution_summary.yaml is written after the run"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: execute
  requires_execution: true
  expected_behaviors:
    - "execution_summary.yaml exists at experiments/{id}/execution_summary.yaml"
    - "execution_summary.yaml contains cost.total_usd"
    - "execution_summary.yaml contains tokens.total_input and tokens.total_output"
    - "execution_summary.yaml contains execution.total_api_calls"
    - "execution_summary.yaml contains status (COMPLETED or BUDGET_EXCEEDED or PARTIAL)"
  unexpected_behaviors:
    - "execution_summary.yaml is absent after execution"
    - "execution_summary.yaml is empty"

# =============================================================================
# EVALUATE PHASE TESTS
# =============================================================================

- id: evaluate-001
  name: "Every result has a composite_score between 1 and 10"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: evaluate
  requires_execution: false
  notes: "Load scores.jsonl and check composite_score range on every record"
  expected_behaviors:
    - "evaluations/scores.jsonl exists"
    - "Every record in scores.jsonl has a composite_score field"
    - "Every composite_score is >= 1.0 and <= 10.0"
    - "Not all composite_scores are identical (evaluation is discriminating)"
  unexpected_behaviors:
    - "Any composite_score is outside the 1-10 range"
    - "composite_score field is absent from any record"
    - "All records have the same composite_score"

- id: evaluate-002
  name: "summary.yaml contains rankings and axis_effects"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: evaluate
  requires_execution: false
  notes: "Load summary.yaml and check for required top-level keys"
  expected_behaviors:
    - "evaluations/summary.yaml exists"
    - "summary.yaml parses as valid YAML"
    - "summary.yaml contains overall_best_combination with cell_id, template_id, model_id, param_id"
    - "summary.yaml contains top_10_cells (or equivalent ranking list)"
    - "summary.yaml contains per_axis_best_levels with axis_means for templates, models, and param_sets"
    - "summary.yaml contains the mean_composite_score for the best cell"
  unexpected_behaviors:
    - "summary.yaml is empty or not parseable"
    - "overall_best_combination is absent"
    - "Axis analysis (per_axis_best_levels or equivalent) is absent"

- id: evaluate-003
  name: "Best cell is identified and consistent with scores"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: evaluate
  requires_execution: false
  notes: "Cross-check that summary.yaml best cell matches the actual highest score in scores.jsonl"
  expected_behaviors:
    - "The cell_id in overall_best_combination corresponds to the record with the highest mean composite_score in scores.jsonl"
    - "The mean_composite_score in summary.yaml matches (within 0.01) the computed mean from scores.jsonl"
  unexpected_behaviors:
    - "The identified best cell is not actually the highest-scoring cell"
    - "The reported score differs from the actual data by more than 0.05"

- id: evaluate-004
  name: "Criterion weights are normalized before scoring"
  prompt: "Optimize content moderation prompts for my e-commerce platform"
  category: evaluate
  requires_execution: false
  notes: "Even if plan.yaml weights do not sum to 1.0 due to rounding, evaluate.py must normalize them"
  expected_behaviors:
    - "evaluate.py applies normalization if weights do not sum to exactly 1.0"
    - "No composite scores are computed from un-normalized weights"
  unexpected_behaviors:
    - "evaluate.py crashes if weights sum to 0.999 instead of 1.0"
    - "Composite scores are computed with raw un-normalized weights, producing out-of-range values"

